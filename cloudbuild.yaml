steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-pilot-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-pilot-backend:latest'
      - '-f'
      - 'Backend/Dockerfile'
      - 'Backend'

  # Step 2: Push image with commit SHA
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ai-pilot-backend:$COMMIT_SHA'

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ai-pilot-backend:latest'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-pilot-backend'
      - '--image=gcr.io/$PROJECT_ID/ai-pilot-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--timeout=300'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--set-env-vars=ENV=production'
      # Secrets from Secret Manager — create these once with:
      #   gcloud secrets create SECRET_NAME --data-file=-
      # Required secrets: openai-api-key, database-url, jwt-secret,
      #   supabase-url, supabase-service-key, clerk-secret-key,
      #   frontend-url, email-username, email-password
      - '--set-secrets=OPENAI_API_KEY=openai-api-key:latest'
      - '--set-secrets=DATABASE_URL=database-url:latest'
      - '--set-secrets=JWT_SECRET=jwt-secret:latest'
      - '--set-secrets=SUPABASE_URL=supabase-url:latest'
      - '--set-secrets=SUPABASE_SERVICE_KEY=supabase-service-key:latest'
      - '--set-secrets=CLERK_SECRET_KEY=clerk-secret-key:latest'
      - '--set-secrets=FRONTEND_URL=frontend-url:latest'
      - '--set-secrets=EMAIL_USERNAME=email-username:latest'
      - '--set-secrets=EMAIL_PASSWORD=email-password:latest'

images:
  - 'gcr.io/$PROJECT_ID/ai-pilot-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/ai-pilot-backend:latest'
